name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tripsync
          POSTGRES_PASSWORD: tripsync
          POSTGRES_DB: tripsync
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tripsync -d tripsync"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Checkout contracts sibling
        uses: actions/checkout@v4
        with:
          repository: kaiqueRoc/trip-sync-contracts
          path: trip-sync-contracts

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build contracts
        working-directory: trip-sync-contracts
        run: npm ci && npm run build

      - name: Install platform
        run: |
          npm ci
          npm install ./trip-sync-contracts --no-save
        env:
          DATABASE_URL: "postgresql://tripsync:tripsync@localhost:5432/tripsync"

      - name: Prisma push & seed
        run: |
          npx prisma db push
          npx prisma db seed
        env:
          DATABASE_URL: "postgresql://tripsync:tripsync@localhost:5432/tripsync"

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://tripsync:tripsync@localhost:5432/tripsync"
          AUTH_SECRET: "ci-secret-min-32-chars-long!!"
          AUTH_URL: "http://localhost:3000"
